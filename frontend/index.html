<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>xin chào</title>
</head>
<body>
    <form id='loginform'>
        <div id="userfield">
            <label>Username: </label>
            <input type="text" name="username" id="username">
        </div>
        <div id="passwordfield">
            <label>Password: </label>
            <input type="password" name="password" id="password">
            <button type="button" id="showhidepassword">Show/Hide</button>
        </div>
        <div id="otpfield" style="display: none">
            <label>OTP: </label>
            <input type="text" name="otp" id="otp">
        </div>
        <div>
            <button type="submit" id="loginbutton">Login</button>
            <button type="button" id="confirmbutton" style="display: none;">Confirm</button>
        </div>
    </form> 

    <script>
        // bọc user data gửi cho backend xử lý 
        // nhập gửi lần 1 
        document.getElementById("loginform")
            .addEventListener("submit", async function (event) {
            event.preventDefault();
            const formdata = new FormData(this);
            const data = {
                username: formdata.get("username"),
                password: formdata.get("password")
            };
            try {
                const respone = await fetch("http://localhost:3000/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });
                if(respone.status === 200){
                    document.getElementById("passwordfield").style.display = "none"
                    document.getElementById("userfield").style.display = "none"
                    document.getElementById("loginbutton").style.display = "none"
                    document.getElementById("otpfield").style.display = "block"
                    document.getElementById("confirmbutton").style.display = "block"

                    // alert("Login succesfull");
                } else {
                    alert("Xác thực thất bại !");
                }
            } catch(error){

            }
        })

        // bọc otp gửi cho backend xử lý 
        // nhập user otp gửi lần 2 
        document.getElementById("confirmbutton")
            .addEventListener("click", async function(event) {
                //const username = document.getElementById("username").value;
                const userotp = document.getElementById("otp").value;
                try {
                    const respone = await fetch("http://localhost:3000/confirm", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({userotp})
                    });
                    if(respone.status === 200){
                        alert("Đăng nhập thành công !");
                    } else {
                        alert("Đăng nhập thất bại !");
                    }
                } catch(error){

                }
            });

        // ẩn hiện password
        document.getElementById("showhidepassword").addEventListener("click", () => {
            const passwordinput = document.getElementById("password");
            if(passwordinput.type == "password")
                passwordinput.type = "text"
            else 
                passwordinput.type = "password"
        })
    </script>
</body>
</html>
